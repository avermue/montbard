const FONT_DISPLAY = "'Fraunces', 'Georgia', serif";
const FONT_MONO = "'JetBrains Mono', 'Courier New', monospace";
const FONT_SANS = "'Inter Tight', 'Helvetica Neue', sans-serif";

// ============================================================
// HELPERS
// ============================================================
const fmt = (n, digits = 0) =>
  n == null ? "—" : n.toLocaleString("fr-FR", { maximumFractionDigits: digits });

const fmtPct = (n, digits = 1) =>
  n == null ? "—" : `${n.toFixed(digits)}%`;

const fmtEur = (n) =>
  n == null
    ? "—"
    : n >= 1e6
    ? `${(n / 1e6).toFixed(1)} M€`
    : n >= 1e3
    ? `${(n / 1e3).toFixed(0)} k€`
    : `${n} €`;

const computeEvolution = (series, field) => {
  if (!series || series.length < 2) return 0;
  const first = series[0][field];
  const last = series[series.length - 1][field];
  if (!first) return 0;
  return ((last - first) / first) * 100;
};

// -------- POPULATION --------
function PopulationSection() {
  const years = Array.from(
    new Set(
      Object.values(DATA.population).flatMap((c) => c.series.map((s) => s.year))
    )
  ).sort();
  
  const chartData = years.map((y) => {
    const row = { year: y };
    Object.entries(DATA.population).forEach(([code, info]) => {
      const pt = info.series.find((s) => s.year === y);
      if (pt) row[info.commune] = pt.value;
    });
    return row;
  });

  // Indexed: base 100 in 1975
  const indexedData = chartData.map((row) => {
    const indexed = { year: row.year };
    Object.keys(COMMUNE_COLORS).forEach((code) => {
      const nom = DATA.population[code].commune;
      const base = DATA.population[code].series.find((s) => s.year === 1975)?.value;
      if (row[nom] && base) {
        indexed[nom] = (row[nom] / base) * 100;
      }
    });
    return indexed;
  });

  return (
    <Panel title="Population" subtitle="Évolution absolue et indicée depuis 1975 (base 100)" span={3}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, flex: 1 }}>
        <div>
          <div style={{ fontFamily: FONT_MONO, fontSize: 10, color: TEXT_DIM, marginBottom: 8 }}>

              <CartesianGrid stroke={BORDER} strokeDasharray="2 4" vertical={false} />
              <XAxis dataKey="year" stroke={TEXT_DIM} fontSize={10} fontFamily={FONT_MONO} />
              <YAxis stroke={TEXT_DIM} fontSize={10} fontFamily={FONT_MONO} />
              <Tooltip contentStyle={TooltipStyle} />
              {Object.entries(DATA.population).map(([code, info]) => (
                <Line
                  key={code}
                  type="monotone"
                  dataKey={info.commune}
                  stroke={COMMUNE_COLORS[code]}
                  strokeWidth={code === "21425" ? 3 : 1.5}
                  dot={{ r: code === "21425" ? 4 : 2 }}
                />
              ))}
              <Legend wrapperStyle={{ fontSize: 10, fontFamily: FONT_MONO }} />
            </LineChart>
          </ResponsiveContainer>
        </div>
        <div>
          <div style={{ fontFamily: FONT_MONO, fontSize: 10, color: TEXT_DIM, marginBottom: 8 }}>
            BASE 100 = 1975
          </div>
          <ResponsiveContainer width="100%" height={280}>
            <LineChart data={indexedData} margin={{ top: 5, right: 10, bottom: 5, left: 0 }}>
              <CartesianGrid stroke={BORDER} strokeDasharray="2 4" vertical={false} />
              <XAxis dataKey="year" stroke={TEXT_DIM} fontSize={10} fontFamily={FONT_MONO} />
              <YAxis stroke={TEXT_DIM} fontSize={10} fontFamily={FONT_MONO} domain={[50, 110]} />
              <ReferenceLine y={100} stroke={TEXT_DIM} strokeDasharray="4 4" />
              <Tooltip contentStyle={TooltipStyle} formatter={(v) => `${v.toFixed(1)}`} />
              {Object.entries(DATA.population).map(([code, info]) => (
                <Line
                  key={code}
                  type="monotone"
                  dataKey={info.commune}
                  stroke={COMMUNE_COLORS[code]}
                  strokeWidth={code === "21425" ? 3 : 1.5}
                  dot={false}
                />
              ))}
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div
        style={{
          marginTop: 16,

// -------- POLITIQUE --------
function ElectionsSection() {
  const years = [2002, 2007, 2012, 2017, 2022];
  const chartData = years.map((y) => {
    const row = { year: y };
    Object.entries(DATA.elections).forEach(([code, info]) => {
      const scrutin = info.presidentielle_t2[y];
      if (scrutin) {
        // Take the first candidate (droite or gauche selon année)
        const keys = Object.keys(scrutin).filter(k => k !== "abstention");
        // Separate left/right candidates
        const left = keys.find(k => /PS|LREM|Socialist|Royal|Hollande|Macron/.test(k));
        const right = keys.find(k => /RPR|UMP|FN|RN|Chirac|Sarkozy|Le Pen/.test(k));
        // Take the "non-RN/non-FN" as "gauche/centre"
        const nonRN = keys.find(k => !/FN|RN|Le Pen/.test(k));
        row[info.commune] = scrutin[nonRN] || 0;
      }
    });
    return row;
  });

  return (
    <Panel title="Élections présidentielles — 2e tour" 
           subtitle="% pour le candidat non-FN/RN · 2002 Chirac, 2007 Royal, 2012 Hollande, 2017-22 Macron"
           span={2}>
      <ResponsiveContainer width="100%" height={240}>
        <LineChart data={chartData}>
          <CartesianGrid stroke={BORDER} strokeDasharray="2 4" vertical={false} />
          <XAxis dataKey="year" stroke={TEXT_DIM} fontSize={10} fontFamily={FONT_MONO} />
          <YAxis stroke={TEXT_DIM} fontSize={10} fontFamily={FONT_MONO} domain={[30, 90]}
                 tickFormatter={(v) => `${v}%`} />
          <Tooltip contentStyle={TooltipStyle} formatter={(v) => fmtPct(v)} />
          <Legend wrapperStyle={{ fontSize: 10, fontFamily: FONT_MONO }} />
          <ReferenceLine y={50} stroke={TEXT_DIM} strokeDasharray="4 4" />
          {Object.entries(DATA.elections).map(([code, info]) => (
            <Line
              key={code}
              type="monotone"
              dataKey={info.commune}
              stroke={COMMUNE_COLORS[code]}
              strokeWidth={code === "21425" ? 3 : 1.5}
              dot={{ r: code === "21425" ? 4 : 3 }}
            />
          ))}
        </LineChart>
      </ResponsiveContainer>
    </Panel>
  );
}

}

// -------- SYNTHESE --------
function SynthesePanel() {
  const pop = DATA.population["21425"].series;
  const popEvol = ((pop[pop.length - 1].value - pop[0].value) / pop[0].value) * 100;
  
  const rev = DATA.revenus["21425"].series;
  const revEvol = ((rev[rev.length - 1].median - rev[0].median) / rev[0].median) * 100;
  
  const emp = DATA.emploi["21425"].series;
  const empEvol = ((emp[emp.length - 1].emploi_salarie - emp[0].emploi_salarie) / emp[0].emploi_salarie) * 100;
  
  const fin = DATA.finances["21425"].series;
  const detteHab = fin[fin.length - 1].dette / fin[fin.length - 1].pop_dgf;
  
  const rnLast = DATA.elections["21425"].presidentielle_t2[2022];
  const rnKey = Object.keys(rnLast).find(k => /RN|Le Pen/.test(k));
  const rnShare = rnLast[rnKey];

  const indicators = [
    { label: "Population", value: `${popEvol.toFixed(1)}%`, sub: `depuis ${pop[0].year}`, color: popEvol < 0 ? "#f87171" : "#34d399" },
    { label: "Revenu médian", value: `+${revEvol.toFixed(1)}%`, sub: `depuis ${rev[0].year}`, color: "#34d399" },
    { label: "Emploi salarié", value: `${empEvol > 0 ? "+" : ""}${empEvol.toFixed(1)}%`, sub: `depuis ${emp[0].year}`, color: empEvol < 0 ? "#f87171" : "#34d399" },
    { label: "Dette par hab.", value: fmt(detteHab), sub: "en 2024", unit: "€", color: ACCENT },
    { label: "Vote RN 2022", value: fmtPct(rnShare), sub: "2ᵉ tour", color: "#ef4444" },
  ];

  return (
    <Panel title="Montbard en 5 chiffres" subtitle="Synthèse 1975-2024" span={3}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 16 }}>
        {indicators.map((ind, i) => (
          <div key={i} style={{ padding: "12px 0", borderRight: i < 4 ? `1px solid ${BORDER}` : "none", paddingLeft: i === 0 ? 0 : 16 }}>
            <div style={{ fontFamily: FONT_MONO, fontSize: 9, color: TEXT_DIM, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 6 }}>
              {ind.label}
            </div>
            <div style={{ fontFamily: FONT_DISPLAY, fontSize: 40, color: ind.color, lineHeight: 1, letterSpacing: "-0.03em" }}>
              {ind.value}
              {ind.unit && <span style={{ fontSize: 20, color: TEXT_DIM, marginLeft: 2 }}>{ind.unit}</span>}
            </div>
            <div style={{ fontFamily: FONT_SANS, fontSize: 11, color: TEXT_DIM, marginTop: 4, fontStyle: "italic" }}>
              {ind.sub}
            </div>
          </div>
        ))}
      </div>
    </Panel>
  );
}
